name: Windows-RDP
on: workflow_dispatch
jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Creating Password
        run: |
          net user runneradmin MyPassword123 /add
          net localgroup administrators runneradmin /add
      - name: Preparing RDP
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
      - name: Install Ngrok
        run: |
          # هاد السطر كيتحمل أحدث نسخة رسمية ومباشرة
          Invoke-WebRequest https://bin.equinox.io/c/bNyj1mQG4pP/ngrok-v3-stable-windows-amd64.zip -OutFile ngrok.zip
          Expand-Archive ngrok.zip
      - name: Start Ngrok
        run: |
          .\ngrok.exe authtoken ${{ secrets.NGROK_AUTH_TOKEN }}
          Start-Process .\ngrok.exe -ArgumentList "tcp 3389"
      - name: Get Address
        run: |
          Start-Sleep -Seconds 30
          $response = Invoke-RestMethod -Uri http://127.0.0.1:4040/api/tunnels
          $addr = $response.tunnels[0].public_url
          Write-Host "===================================="
          Write-Host "Your RDP Address: $addr"
          Write-Host "User: runneradmin"
          Write-Host "Password: MyPassword123"
          Write-Host "===================================="
          Start-Sleep -Hours 6
